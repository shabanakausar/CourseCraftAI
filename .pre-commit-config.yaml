repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: semgrep-secrets-scan
        name: Semgrep Secret Scanning
        entry: uv run semgrep --config .semgrep/rules.yaml --error
        language: system
        files: \.py$
