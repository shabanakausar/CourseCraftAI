# apphosting.yaml
# Settings for Firebase App Hosting native Next.js deployment
# See: https://firebase.google.com/docs/app-hosting/configure
# Trigger build deployment after enabling Cloud Build API

runConfig:
  minInstances: 0
  maxInstances: 3
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables setup
# GEMINI_API_KEY should be bound to a Secret Manager secret in the Firebase Console
env:
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: AGENT_ENDPOINT_URL
    value: https://coursecraft-agent-655135715510.us-central1.run.app
